# OLMo config for 1M proxy model
# Architecture from Olmix paper Table 6
run_name: proxy_1m_base
seed: 6198
dry_run: false

model:
  d_model: 16
  n_heads: 4
  n_layers: 4
  mlp_ratio: 4
  rope: true
  flash_attention: false  # too small for flash attention benefit
  activation_type: swiglu
  vocab_size: 100352
  embedding_size: 100352
  max_sequence_length: 2048
  weight_tying: true
  attention_dropout: 0.0
  residual_dropout: 0.0
  embedding_dropout: 0.0
  layer_norm_type: rms
  include_bias: false
  init_fn: normal
  init_std: 0.02

optimizer:
  name: adamw
  learning_rate: 0.007
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: cosine_with_warmup
  t_warmup: 500
  alpha_f: 0.1

tokenizer:
  identifier: allenai/dolma2-tokenizer

data:
  num_workers: 4
  drop_last: true
  pin_memory: true
  prefetch_factor: 4
  persistent_workers: true
  memmap_dtype: uint32
  paths: []  # populated by generate_run_configs.py

max_duration: 40000000 tokens  # 40M tokens = 2x Chinchilla for 1M params
global_train_batch_size: 64
device_train_microbatch_size: 16

precision: amp_bf16
distributed_strategy: single

save_folder: ./checkpoints/proxy_1m_base
save_interval_unsharded: 10000
eval_interval: 5000
console_log_interval: 100
